<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMI Calcultor</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>BMI Calculator</h1>
        <img src="assets/BMI logo.png" alt="" width="100px" height="100px" />
      </header>

      <form action="" method="">
        <div>
          <label for="name">Your Name:</label>
          <input type="text" name="name" id="name" />
        </div>

        <div>
          <label for="gender">Your gender:</label>
          <input type="radio" name="gender" id="gender" />Male
          <input type="radio" name="gender" id="gender" />Female
        </div>

        <div>
          <label for="age">Age(in years):</label>
          <input type="number" min="1" name="age" id="age" />
        </div>

        <div>
          <label for="height">Height(in cm):</label>
          <input type="number" min="10" name="height" id="height" />
        </div>

        <div>
          <label for="weight">Weight(in kg):</label>
          <input type="number" min="1" name="weight" id="weight" />
        </div>

        <button>Calculate BMI</button>
      </form>
    </div>
    <div class="results">
      <h2>Results:</h2>
    </div>
  </body>
</html>
