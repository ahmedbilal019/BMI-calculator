<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMI Calcultor</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>BMI Calculator</h1>
        <img src="assets/BMI logo.png" alt="" width="100px" height="100px" />
      </header>

      <form action="">
        <div>
          <label for="user-name">Your Name:</label>
          <input type="text" name="user-name" id="user-name" />
        </div>

        <div>
          <label for="gender">Your gender:</label>
          <input type="radio" name="gender" id="gender" value="male" />Male
          <input type="radio" name="gender" id="gender" value="Female" />Female
        </div>

        <div>
          <label for="age">Age <i>(in years)</i>:</label>
          <input type="number" min="1" name="age" id="age" />
        </div>

        <div>
          <label for="height">Height:</label>
          <input type="number" min="10" name="height" id="height" />
        </div>

        <div>
          <label for="weight">Weight <i>(in kilograms)</i>:</label>
          <input type="number" min="1" name="weight" id="weight" />
        </div>

        <button onclick="cal()" type="button">Calculate BMI</button>
      </form>
    </div>
    <div class="results">
      <h2>Results:</h2>
    </div>
    <script src="script.js"></script>
  </body>
</html>
